<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待辦事項</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>我的待辦事項</h1>

        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="新增一個待辦事項..." autocomplete="off" required>
            <input type="date" id="todo-due-date">
            <select id="todo-priority">
                <option value="medium">一般</option>
                <option value="high">高</option>
                <option value="low">低</option>
            </select>
            <input type="text" id="todo-tags" placeholder="標籤 (用逗號分隔)">
            <button type="submit">
                <i class="fas fa-plus"></i> 新增
            </button>
        </form>

        <div class="list-controls">
            <div id="filter-controls">
                <span id="current-filter-info"></span>
                <button id="clear-filter-btn" class="hidden">
                    <i class="fas fa-times-circle"></i> 清除篩選
                </button>
            </div>
            <div id="sort-controls">
                <label for="sort-options">排序方式：</label>
                <select id="sort-options">
                    <option value="default">預設 (最新)</option>
                    <option value="dueDateAsc">截止日期 (由近到遠)</option>
                    <option value="dueDateDesc">截止日期 (由遠到近)</option>
                    <option value="priority">優先順序 (高→低)</option>
                </select>
            </div>
        </div>

        <ul id="todo-list">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
